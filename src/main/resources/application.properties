spring.application.name=jobtracker

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jobtracker}
spring.datasource.username=${DB_USERNAME:jobtracker}
spring.datasource.password=${DB_PASSWORD:jobtracker}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
