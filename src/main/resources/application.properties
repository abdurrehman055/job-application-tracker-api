spring.application.name=jobtracker

server.port=${PORT:8080}

# Railway (and similar PaaS) terminate TLS at their edge and forward to this
# container over plain HTTP, adding X-Forwarded-Proto/Host/Port headers.
# "framework" tells Spring's ForwardedHeaderFilter to trust those headers and
# rewrite the perceived scheme/host, so springdoc/Swagger generate https:// URLs.
# Safe here because Railway's proxy is the only way to reach this container.
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jobtracker}
spring.datasource.username=${DB_USERNAME:jobtracker}
spring.datasource.password=${DB_PASSWORD:jobtracker}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dev-only default secret; MUST be overridden via env var outside local dev
jwt.secret=${JWT_SECRET:qMNPS68tYwBZfqHsP11Iq/aXaWzjMDowtgaO4HJetyM=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Scoped to our own security code only - not framework-wide noise - so the
# exact reason a request is/isn't authenticated is visible without extra config.
logging.level.com.abdurrehman.jobtracker.security=DEBUG
